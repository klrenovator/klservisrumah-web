<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="KL Servis Rumah - Professional Home Services">
  <defs>
    <linearGradient id="klGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#075985"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- KL monogram left side -->
  <g transform="translate(60, 100)">
    <!-- K -->
    <path d="M0 0 L0 400 L70 400 L70 240 L140 400 L200 400 L110 200 L190 0 L130 0 L70 170 L0 0Z" fill="url(#klGrad)"/>
    <!-- L -->
    <path d="M210 0 L210 400 L380 400 L380 340 L280 340 L280 0Z" fill="url(#klGrad)"/>
  </g>
  <!-- House outline right side -->
  <g transform="translate(600, 30)">
    <path d="M0 220 L0 80 L180 0 L360 80 L360 220" fill="none" stroke="#075985" stroke-width="12"/>
    <rect x="290" y="10" width="30" height="50" rx="4" fill="#075985"/>
    <!-- Tool icons -->
    <g transform="translate(30, 60)">
      <!-- Small house -->
      <g transform="translate(0, 0) scale(0.7)">
        <path d="M20 50 L50 20 L80 50 L80 90 L20 90Z" fill="#075985"/>
        <rect x="40" y="60" width="20" height="30" rx="2" fill="#fff"/>
        <rect x="30" y="35" width="12" height="12" rx="1" fill="#fff"/>
        <rect x="58" y="35" width="12" height="12" rx="1" fill="#fff"/>
      </g>
      <!-- Paint roller -->
      <g transform="translate(80, 0) scale(0.65)">
        <rect x="10" y="15" width="60" height="25" rx="7" fill="#0EA5E9"/>
        <line x1="40" y1="40" x2="40" y2="75" stroke="#075985" stroke-width="6" stroke-linecap="round"/>
        <rect x="28" y="70" width="24" height="18" rx="4" fill="#075985"/>
        <path d="M15 40 Q15 60 28 70" fill="none" stroke="#0EA5E9" stroke-width="3"/>
      </g>
      <!-- Wrench -->
      <g transform="translate(165, 0) scale(0.7)">
        <path d="M30 10 L30 80 L50 80 L50 45 C50 35 60 28 60 28 C60 12 42 5 30 12 C18 5 0 12 0 28 C0 38 12 45 12 45 L12 80 L30 80" fill="#075985"/>
        <circle cx="40" cy="70" r="3" fill="#fff"/>
      </g>
      <!-- Hammer & screwdriver -->
      <g transform="translate(235, 0) scale(0.6)">
        <line x1="15" y1="10" x2="70" y2="80" stroke="#075985" stroke-width="8" stroke-linecap="round"/>
        <line x1="70" y1="10" x2="15" y2="80" stroke="#0EA5E9" stroke-width="8" stroke-linecap="round"/>
        <rect x="0" y="0" width="30" height="18" rx="5" fill="#075985" transform="rotate(-45 15 10)"/>
      </g>
    </g>
    <!-- Text -->
    <text x="180" y="310" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" text-anchor="middle" letter-spacing="2">
      <tspan fill="#075985">KL </tspan>
      <tspan fill="#0EA5E9">SERVIS </tspan>
      <tspan fill="#075985">RUMAH</tspan>
    </text>
    <text x="180" y="365" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600" fill="#475569" text-anchor="middle" letter-spacing="6">PROFESSIONAL HOME SERVICES</text>
    <!-- Hexagon shield outline -->
    <path d="M80 390 L80 420 L180 470 L280 420 L280 390" fill="none" stroke="url(#klGrad)" stroke-width="8" stroke-linejoin="round"/>
  </g>
</svg>