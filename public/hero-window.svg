<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <defs>
    <linearGradient id="wnbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#075985"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#wnbg)"/>
  <circle cx="950" cy="120" r="220" fill="#fff" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#fff" opacity="0.04"/>
  <!-- Window with 4 panes -->
  <g transform="translate(490, 110)">
    <!-- Outer frame -->
    <rect x="0" y="0" width="220" height="280" rx="4" fill="#fff" opacity="0.18" stroke="#fff" stroke-width="3" opacity="0.7"/>
    <!-- Inner panes (4) -->
    <line x1="110" y1="0" x2="110" y2="280" stroke="#fff" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="140" x2="220" y2="140" stroke="#fff" stroke-width="2" opacity="0.7"/>
    <!-- Glass reflections -->
    <rect x="10" y="10" width="90" height="120" fill="#0EA5E9" opacity="0.3"/>
    <path d="M10 10 L100 130 M30 10 L100 100" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <rect x="120" y="150" width="90" height="120" fill="#0EA5E9" opacity="0.3"/>
    <path d="M120 150 L210 270 M140 150 L210 240" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <!-- Handle -->
    <circle cx="110" cy="140" r="4" fill="#fff"/>
    <rect x="105" y="135" width="10" height="3" fill="#fff" opacity="0.9"/>
    <!-- Sill -->
    <rect x="-10" y="280" width="240" height="14" rx="2" fill="#fff" opacity="0.4"/>
  </g>
  <!-- Sparkle dots -->
  <circle cx="850" cy="180" r="4" fill="#fff" opacity="0.7"/>
  <circle cx="920" cy="240" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="880" cy="380" r="5" fill="#fff" opacity="0.6"/>
  <circle cx="950" cy="420" r="4" fill="#fff" opacity="0.5"/>
</svg>
