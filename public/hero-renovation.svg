  <rect x="620" y="380" width="14" height="60" rx="3" fill="#fff" opacity="0.4" transform="rotate(-25 627 410)"/>
  <circle cx="560" cy="420" r="14" fill="#fff" opacity="0.3" transform="rotate(-25 560 420)"/>
