<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <defs>
    <linearGradient id="lobg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#lobg)"/>
  <circle cx="950" cy="120" r="220" fill="#fff" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#fff" opacity="0.04"/>
  <!-- Large key shape -->
  <g transform="translate(420, 220)">
    <!-- Key bow (head) -->
    <circle cx="100" cy="100" r="80" fill="#fff" opacity="0.2" stroke="#fff" stroke-width="3" opacity="0.7"/>
    <circle cx="100" cy="100" r="30" fill="#0EA5E9" opacity="0.3"/>
    <circle cx="100" cy="100" r="20" fill="#fff" opacity="0.4"/>
    <!-- Key shaft -->
    <rect x="180" y="90" width="240" height="20" fill="#fff" opacity="0.85"/>
    <!-- Key teeth -->
    <rect x="350" y="110" width="20" height="35" fill="#fff" opacity="0.85"/>
    <rect x="385" y="110" width="20" height="50" fill="#fff" opacity="0.85"/>
    <!-- Decorative dots on bow -->
    <circle cx="100" cy="60" r="3" fill="#fff" opacity="0.5"/>
    <circle cx="140" cy="100" r="3" fill="#fff" opacity="0.5"/>
    <circle cx="100" cy="140" r="3" fill="#fff" opacity="0.5"/>
    <circle cx="60" cy="100" r="3" fill="#fff" opacity="0.5"/>
  </g>
  <!-- Shield/lock indicator -->
  <g transform="translate(870, 380)">
    <path d="M40 0 L80 12 L80 50 Q80 70 40 90 Q0 70 0 50 L0 12 Z" fill="#fff" opacity="0.2" stroke="#fff" stroke-width="2" opacity="0.7"/>
    <path d="M30 50 L38 58 L55 38" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
