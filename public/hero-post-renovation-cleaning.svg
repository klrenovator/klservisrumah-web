<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <defs>
    <linearGradient id="prbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#075985"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#prbg)"/>
  <circle cx="950" cy="120" r="220" fill="#fff" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#fff" opacity="0.04"/>
  <!-- Newly built/renovated house -->
  <g transform="translate(470, 110)">
    <!-- House body -->
    <rect x="20" y="100" width="240" height="200" fill="#fff" opacity="0.18" stroke="#fff" stroke-width="2" opacity="0.6"/>
    <!-- Roof -->
    <path d="M0 110 L140 30 L280 110 Z" fill="#fff" opacity="0.25" stroke="#fff" stroke-width="2" opacity="0.7"/>
    <!-- Windows (new) -->
    <rect x="50" y="140" width="60" height="60" fill="#0EA5E9" opacity="0.3" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <line x1="80" y1="140" x2="80" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="50" y1="170" x2="110" y2="170" stroke="#fff" stroke-width="1"/>
    <rect x="170" y="140" width="60" height="60" fill="#0EA5E9" opacity="0.3" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <line x1="200" y1="140" x2="200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="170" y1="170" x2="230" y2="170" stroke="#fff" stroke-width="1"/>
    <!-- Door -->
    <rect x="115" y="220" width="50" height="80" fill="#fff" opacity="0.4" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <circle cx="155" cy="260" r="2" fill="#075985"/>
  </g>
  <!-- Construction dust particles (floating) -->
  <circle cx="800" cy="160" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="850" cy="200" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="820" cy="240" r="4" fill="#fff" opacity="0.4"/>
  <circle cx="880" cy="180" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="780" cy="220" r="3" fill="#fff" opacity="0.4"/>
  <circle cx="900" cy="280" r="2" fill="#fff" opacity="0.5"/>
  <!-- Broom icon -->
  <g transform="translate(840, 380)">
    <line x1="0" y1="0" x2="40" y2="-30" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <path d="M-20 30 L20 0 L40 10 L0 40 Z" fill="#0EA5E9" opacity="0.6" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
    <line x1="-20" y1="30" x2="0" y2="40" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
    <line x1="-15" y1="35" x2="5" y2="45" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
  </g>
</svg>
