<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <defs>
    <linearGradient id="scbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284C7"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#scbg)"/>
  <circle cx="950" cy="120" r="220" fill="#fff" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#fff" opacity="0.04"/>
  <!-- Wall section being skimmed -->
  <g transform="translate(580, 80)">
    <!-- Unfinished wall (rougher) -->
    <rect x="0" y="0" width="280" height="380" fill="#fff" opacity="0.15"/>
    <rect x="0" y="0" width="280" height="380" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Texture lines (unfinished) -->
    <line x1="20" y1="40" x2="60" y2="40" stroke="#fff" stroke-width="1" opacity="0.4"/>
    <line x1="20" y1="60" x2="50" y2="60" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="20" y1="80" x2="40" y2="80" stroke="#fff" stroke-width="1" opacity="0.4"/>
    <!-- Finished section (smooth, brighter) -->
    <rect x="180" y="0" width="280" height="380" fill="#fff" opacity="0.5"/>
    <rect x="180" y="0" width="280" height="380" stroke="#fff" stroke-width="2" fill="none" opacity="0.9"/>
    <!-- Boundary line -->
    <line x1="180" y1="0" x2="180" y2="380" stroke="#0EA5E9" stroke-width="3" stroke-dasharray="6 6" opacity="0.9"/>
    <!-- Skim trowel tool -->
    <g transform="translate(120, 180)">
      <rect x="0" y="0" width="120" height="22" rx="3" fill="#fff" opacity="0.95"/>
      <rect x="56" y="22" width="8" height="60" fill="#fff" opacity="0.85"/>
      <rect x="48" y="80" width="24" height="20" rx="4" fill="#fff" opacity="0.6"/>
    </g>
  </g>
  <!-- Smoothness indicators on right -->
  <g transform="translate(1080, 200)">
    <circle cx="0" cy="0" r="6" fill="#fff" opacity="0.9"/>
    <circle cx="0" cy="20" r="4" fill="#fff" opacity="0.7"/>
    <circle cx="0" cy="36" r="3" fill="#fff" opacity="0.5"/>
    <circle cx="0" cy="50" r="2" fill="#fff" opacity="0.3"/>
  </g>
</svg>
