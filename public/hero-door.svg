<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <defs>
    <linearGradient id="drbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#drbg)"/>
  <circle cx="950" cy="120" r="220" fill="#fff" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#fff" opacity="0.04"/>
  <!-- Door (open at angle) -->
  <g transform="translate(500, 100)">
    <!-- Frame -->
    <rect x="0" y="0" width="180" height="340" rx="2" fill="none" stroke="#fff" stroke-width="3" opacity="0.7"/>
    <!-- Door (slightly open) -->
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="150" height="300" rx="2" fill="#fff" opacity="0.25" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
      <!-- Upper panel -->
      <rect x="14" y="20" width="122" height="100" rx="2" fill="#0EA5E9" opacity="0.25" stroke="#fff" stroke-width="1" opacity="0.5"/>
      <!-- Lower panel -->
      <rect x="14" y="140" width="122" height="120" rx="2" fill="#0EA5E9" opacity="0.25" stroke="#fff" stroke-width="1" opacity="0.5"/>
      <!-- Door handle -->
      <circle cx="125" cy="170" r="4" fill="#fff" opacity="0.95"/>
      <rect x="122" y="160" width="6" height="20" rx="2" fill="#fff" opacity="0.9"/>
      <!-- Hinges -->
      <rect x="-3" y="20" width="6" height="20" fill="#fff" opacity="0.7"/>
      <rect x="-3" y="260" width="6" height="20" fill="#fff" opacity="0.7"/>
    </g>
  </g>
  <!-- Door knob on side -->
  <g transform="translate(880, 200)">
    <circle cx="40" cy="40" r="30" fill="#fff" opacity="0.2" stroke="#fff" stroke-width="2" opacity="0.6"/>
    <circle cx="40" cy="40" r="10" fill="#fff" opacity="0.5"/>
    <rect x="40" y="30" width="40" height="6" rx="2" fill="#fff" opacity="0.7"/>
  </g>
</svg>
