<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <defs>
    <linearGradient id="kcbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#kcbg)"/>
  <circle cx="950" cy="120" r="220" fill="#fff" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#fff" opacity="0.04"/>
  <!-- Kitchen cabinets -->
  <g transform="translate(440, 110)">
    <!-- Upper cabinets -->
    <rect x="0" y="0" width="100" height="80" rx="2" fill="#fff" opacity="0.2" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <rect x="110" y="0" width="100" height="80" rx="2" fill="#fff" opacity="0.25" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <rect x="220" y="0" width="100" height="80" rx="2" fill="#fff" opacity="0.2" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <!-- Hood/vent -->
    <rect x="140" y="-30" width="40" height="20" fill="#fff" opacity="0.5"/>
    <!-- Countertop -->
    <rect x="-10" y="90" width="340" height="14" fill="#fff" opacity="0.4"/>
    <!-- Lower cabinets -->
    <rect x="0" y="110" width="100" height="160" rx="2" fill="#fff" opacity="0.25" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <rect x="110" y="110" width="100" height="160" rx="2" fill="#fff" opacity="0.3" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <rect x="220" y="110" width="100" height="160" rx="2" fill="#fff" opacity="0.25" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <!-- Handles -->
    <line x1="50" y1="180" x2="50" y2="190" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="160" y1="180" x2="160" y2="190" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="270" y1="180" x2="270" y2="190" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <!-- Cooktop hint -->
    <circle cx="160" cy="100" r="6" fill="#0EA5E9" opacity="0.6"/>
  </g>
  <!-- Decorative tool icon (measuring tape) -->
  <g transform="translate(880, 380)">
    <rect x="0" y="0" width="80" height="20" rx="4" fill="#fff" opacity="0.85"/>
    <rect x="0" y="20" width="6" height="6" fill="#fff" opacity="0.85"/>
    <line x1="10" y1="0" x2="10" y2="20" stroke="#075985" stroke-width="0.5"/>
    <line x1="20" y1="0" x2="20" y2="20" stroke="#075985" stroke-width="0.5"/>
    <line x1="30" y1="0" x2="30" y2="20" stroke="#075985" stroke-width="0.5"/>
    <line x1="40" y1="0" x2="40" y2="20" stroke="#075985" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="20" stroke="#075985" stroke-width="0.5"/>
    <line x1="60" y1="0" x2="60" y2="20" stroke="#075985" stroke-width="0.5"/>
    <line x1="70" y1="0" x2="70" y2="20" stroke="#075985" stroke-width="0.5"/>
  </g>
</svg>
