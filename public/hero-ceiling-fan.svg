<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <defs>
    <linearGradient id="cfbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#cfbg)"/>
  <circle cx="950" cy="120" r="220" fill="#fff" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#fff" opacity="0.04"/>
  <!-- Ceiling fan -->
  <g transform="translate(600, 100)">
    <!-- Center motor -->
    <rect x="80" y="40" width="40" height="40" rx="6" fill="#fff" opacity="0.85"/>
    <rect x="92" y="0" width="16" height="50" fill="#fff" opacity="0.6"/>
    <!-- Top mount -->
    <rect x="86" y="0" width="28" height="8" rx="2" fill="#fff" opacity="0.7"/>
    <!-- Fan blades (3) -->
    <path d="M100 60 L20 70 Q10 80 20 90 L100 80 Z" fill="#fff" opacity="0.6"/>
    <path d="M100 60 L180 70 Q190 80 180 90 L100 80 Z" fill="#fff" opacity="0.6"/>
    <path d="M100 80 L80 180 Q70 195 90 200 L120 80 Z" fill="#fff" opacity="0.6"/>
    <!-- Motion lines -->
    <path d="M30 130 q15 -5 30 0" stroke="#fff" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M170 130 q-15 -5 -30 0" stroke="#fff" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M150 200 q-5 -15 0 -30" stroke="#fff" stroke-width="2" fill="none" opacity="0.4"/>
  </g>
  <!-- Air flow dots -->
  <circle cx="540" cy="350" r="5" fill="#fff" opacity="0.3"/>
  <circle cx="600" cy="380" r="4" fill="#fff" opacity="0.4"/>
  <circle cx="660" cy="350" r="5" fill="#fff" opacity="0.3"/>
  <circle cx="720" cy="380" r="4" fill="#fff" opacity="0.4"/>
  <circle cx="780" cy="350" r="5" fill="#fff" opacity="0.3"/>
  <circle cx="840" cy="380" r="4" fill="#fff" opacity="0.4"/>
</svg>
