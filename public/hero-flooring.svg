    <line x1="230" y1="220" x2="230" y2="240" stroke="#0284C7" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="240" x2="50" y2="260" stroke="#0284C7" stroke-width="1" opacity="0.4"/>
    <line x1="110" y1="240" x2="110" y2="260" stroke="#0284C7" stroke-width="1" opacity="0.4"/>
    <line x1="170" y1="240" x2="170" y2="260" stroke="#0284C7" stroke-width="1" opacity="0.4"/>
