    <line x1="110" y1="200" x2="110" y2="220" stroke="#0284C7" stroke-width="1" opacity="0.6"/>
    <line x1="170" y1="200" x2="170" y2="220" stroke="#0284C7" stroke-width="1" opacity="0.6"/>
    <line x1="230" y1="200" x2="230" y2="220" stroke="#0284C7" stroke-width="1" opacity="0.6"/>
