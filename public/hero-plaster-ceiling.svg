<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <defs>
    <linearGradient id="pcbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#075985"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#pcbg)"/>
  <circle cx="950" cy="120" r="220" fill="#fff" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#fff" opacity="0.04"/>
  <!-- Tiered ceiling profile (side view) -->
  <g transform="translate(500, 80)">
    <!-- Top tier -->
    <rect x="0" y="0" width="500" height="60" fill="#fff" opacity="0.2"/>
    <rect x="0" y="0" width="500" height="60" stroke="#fff" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- L-box step -->
    <rect x="0" y="60" width="40" height="60" fill="#fff" opacity="0.3"/>
    <rect x="40" y="80" width="20" height="40" fill="#fff" opacity="0.25"/>
    <rect x="60" y="100" width="440" height="20" fill="#fff" opacity="0.3"/>
    <!-- Main ceiling -->
    <rect x="60" y="120" width="440" height="160" fill="#fff" opacity="0.18"/>
    <rect x="60" y="120" width="440" height="160" stroke="#fff" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- Downlights -->
    <circle cx="180" cy="180" r="8" fill="#fff" opacity="0.95"/>
    <circle cx="180" cy="180" r="14" fill="#fff" opacity="0.3"/>
    <circle cx="320" cy="180" r="8" fill="#fff" opacity="0.95"/>
    <circle cx="320" cy="180" r="14" fill="#fff" opacity="0.3"/>
    <circle cx="460" cy="180" r="8" fill="#fff" opacity="0.95"/>
    <circle cx="460" cy="180" r="14" fill="#fff" opacity="0.3"/>
    <!-- Cove LED strip -->
    <line x1="40" y1="80" x2="40" y2="120" stroke="#fff" stroke-width="6" opacity="0.7"/>
    <line x1="40" y1="80" x2="40" y2="120" stroke="#fff" stroke-width="12" opacity="0.3"/>
    <line x1="60" y1="100" x2="60" y2="120" stroke="#fff" stroke-width="6" opacity="0.7"/>
    <line x1="60" y1="100" x2="60" y2="120" stroke="#fff" stroke-width="12" opacity="0.3"/>
  </g>
  <!-- Light rays from downlights -->
  <line x1="680" y1="280" x2="680" y2="340" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <line x1="820" y1="280" x2="820" y2="340" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <line x1="960" y1="280" x2="960" y2="340" stroke="#fff" stroke-width="2" opacity="0.3"/>
</svg>
