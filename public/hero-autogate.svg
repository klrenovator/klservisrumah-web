<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <defs>
    <linearGradient id="agbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284C7"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#agbg)"/>
  <circle cx="950" cy="120" r="220" fill="#fff" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#fff" opacity="0.04"/>
  <!-- Gate (partially open) -->
  <g transform="translate(380, 130)">
    <!-- Concrete pillars -->
    <rect x="0" y="0" width="40" height="280" fill="#fff" opacity="0.4"/>
    <rect x="440" y="0" width="40" height="280" fill="#fff" opacity="0.4"/>
    <!-- Left gate panel (slightly open) -->
    <g transform="translate(40, 30)">
      <rect x="0" y="0" width="180" height="220" fill="none" stroke="#fff" stroke-width="3" opacity="0.7"/>
      <!-- Vertical bars -->
      <line x1="20" y1="10" x2="20" y2="210" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="50" y1="10" x2="50" y2="210" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="80" y1="10" x2="80" y2="210" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="110" y1="10" x2="110" y2="210" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="140" y1="10" x2="140" y2="210" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="170" y1="10" x2="170" y2="210" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <!-- Horizontal bars -->
      <line x1="10" y1="50" x2="170" y2="50" stroke="#fff" stroke-width="2" opacity="0.5"/>
      <line x1="10" y1="110" x2="170" y2="110" stroke="#fff" stroke-width="2" opacity="0.5"/>
      <line x1="10" y1="170" x2="170" y2="170" stroke="#fff" stroke-width="2" opacity="0.5"/>
    </g>
    <!-- Right gate panel (slightly open) -->
    <g transform="translate(260, 30)">
      <rect x="0" y="0" width="180" height="220" fill="none" stroke="#fff" stroke-width="3" opacity="0.7"/>
      <line x1="20" y1="10" x2="20" y2="210" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="50" y1="10" x2="50" y2="210" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="80" y1="10" x2="80" y2="210" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="110" y1="10" x2="110" y2="210" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="140" y1="10" x2="140" y2="210" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="170" y1="10" x2="170" y2="210" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="10" y1="50" x2="170" y2="50" stroke="#fff" stroke-width="2" opacity="0.5"/>
      <line x1="10" y1="110" x2="170" y2="110" stroke="#fff" stroke-width="2" opacity="0.5"/>
      <line x1="10" y1="170" x2="170" y2="170" stroke="#fff" stroke-width="2" opacity="0.5"/>
    </g>
    <!-- Motor (top of pillar) -->
    <rect x="195" y="-30" width="90" height="30" rx="4" fill="#fff" opacity="0.7"/>
    <circle cx="240" cy="-15" r="4" fill="#0284C7"/>
    <!-- Wheels (bottom) -->
    <circle cx="60" cy="260" r="6" fill="#fff" opacity="0.7"/>
    <circle cx="420" cy="260" r="6" fill="#fff" opacity="0.7"/>
  </g>
  <!-- Remote control icon (right) -->
  <g transform="translate(880, 380)">
    <rect x="0" y="0" width="40" height="60" rx="4" fill="#fff" opacity="0.6"/>
    <rect x="10" y="10" width="20" height="4" rx="1" fill="#0284C7"/>
    <circle cx="20" cy="30" r="6" fill="#0284C7" opacity="0.7"/>
    <circle cx="20" cy="30" r="3" fill="#fff"/>
    <rect x="10" y="45" width="8" height="6" rx="1" fill="#0284C7" opacity="0.7"/>
    <rect x="22" y="45" width="8" height="6" rx="1" fill="#0284C7" opacity="0.7"/>
  </g>
  <!-- Wireless signal arcs -->
  <path d="M860 200 Q900 200 900 240" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M870 210 Q890 210 890 230" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
