<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <defs>
    <linearGradient id="gabg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#075985"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#gabg)"/>
  <circle cx="950" cy="120" r="220" fill="#fff" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#fff" opacity="0.04"/>
  <!-- Shower screen / glass panel -->
  <g transform="translate(450, 100)">
    <!-- Aluminium frame -->
    <rect x="0" y="0" width="300" height="320" fill="none" stroke="#fff" stroke-width="6" opacity="0.7"/>
    <!-- Glass panel -->
    <rect x="3" y="3" width="294" height="314" fill="#fff" opacity="0.18"/>
    <!-- Glass reflection -->
    <path d="M10 10 L100 200 M30 10 L150 200 M60 10 L200 200" stroke="#fff" stroke-width="1" opacity="0.4"/>
    <path d="M280 10 L190 200 M260 10 L150 200 M230 10 L100 200" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
    <!-- Frame inner divisions -->
    <line x1="150" y1="0" x2="150" y2="320" stroke="#fff" stroke-width="3" opacity="0.5"/>
  </g>
  <!-- Decorative aluminium profiles -->
  <g transform="translate(820, 200)">
    <rect x="0" y="0" width="60" height="6" rx="1" fill="#fff" opacity="0.8"/>
    <rect x="0" y="14" width="60" height="6" rx="1" fill="#fff" opacity="0.6"/>
    <rect x="0" y="28" width="60" height="6" rx="1" fill="#fff" opacity="0.4"/>
  </g>
</svg>
